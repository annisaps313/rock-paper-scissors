<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1 class="choice"></h1>
      <hr />
      <h2 class="heart"></h2>
      <h2 class="result"></h2>
      <div class="btn-container">
        <div class="btn-item">
          <span>🖐</span><input type="button" value="rock" />
        </div>
        <div class="btn-item">
          <span>✊</span><input type="button" value="paper" />
        </div>
        <div class="btn-item">
          <span>✌️</span><input type="button" value="scissors" />
        </div>
      </div>
    </main>
    <script src="./index.js"></script>
  </body>
</html>
